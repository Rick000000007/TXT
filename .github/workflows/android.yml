- name: Build APK (full debug)
  run: |
    set -x   # 🔥 SHOW EVERY COMMAND

    cd android

    echo "PWD:"
    pwd

    echo "FILES:"
    ls -la

    echo "Checking gradlew:"
    file gradlew

    echo "Fix line endings:"
    sed -i 's/\r$//' gradlew

    chmod +x gradlew

    echo "RUN gradlew version:"
    bash -x gradlew --version || echo "gradlew version failed"

    echo "RUN clean:"
    bash -x gradlew clean || echo "clean failed"

    echo "RUN build:"
    bash -x gradlew assembleDebug --stacktrace || echo "build failed"
